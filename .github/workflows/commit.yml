name: "Commit"

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_call:

permissions:
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Set up Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: "Build all packages"
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Set up Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: "Install gotestsum"
        run: go install gotest.tools/gotestsum@latest

      - name: "Run Go tests"
        run: gotestsum --junitfile junit-report.xml --format standard-verbose ./...

      - name: "Check if test reports were created"
        id: junit-reports-exist
        uses: andstor/file-existence-action@v3
        with:
          files: "junit-report.xml"

      - name: "Publish Test Report"
        uses: mikepenz/action-junit-report@v6
        if: steps.junit-reports-exist.outputs.files_exists == 'true'
        with:
          report_paths: 'junit-report.xml'

  complexity:
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Set up Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: "Install gocyclo"
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: "Run gocyclo"
        run: gocyclo -over 30 -ignore '_test\.go$' .

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Set up Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: "Install golangci-lint v2"
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: "Run golangci-lint"
        run: golangci-lint run

  check-licenses:
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Set up Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: "Install go-licenses"
        run: go install github.com/google/go-licenses@latest

      - name: "Run go-licenses"
        run: go-licenses report ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Set up Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: "Install gosec"
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: "Run gosec"
        run: |
          # G104 — best-effort cleanup is intentional
          # G115 — PG wire codecs do controlled int truncation by design
          # G404 — math/rand is fine for non-crypto stubs (sequence seeds in tests)
          gosec -exclude=G104,G115,G404 -fmt=junit-xml -out=gosec-report.xml -stdout ./...

      - name: "Check if security report was created"
        id: gosec-report-exists
        uses: andstor/file-existence-action@v3
        with:
          files: "gosec-report.xml"

      - name: "Publish Security Report"
        uses: mikepenz/action-junit-report@v6
        if: steps.gosec-report-exists.outputs.files_exists == 'true'
        with:
          report_paths: 'gosec-report.xml'

  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      security-events: write
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6

      - name: "Initialize CodeQL"
        uses: github/codeql-action/init@v4
        with:
          languages: 'go'

      - name: "Perform CodeQL Analysis"
        uses: github/codeql-action/analyze@v4
