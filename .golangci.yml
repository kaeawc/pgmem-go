version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    errorlint:
      errorf: true
    gocyclo:
      # 30 is permissive on purpose: dispatch-style switches (the SQL
      # lexer, the IR walker, expression evaluation) inflate the gocyclo
      # score without being genuinely complex. We rely on code review for
      # those; gocyclo still catches accidental spaghetti elsewhere.
      min-complexity: 30
    govet:
      disable:
        - fieldalignment
        - shadow
    gosec:
      excludes:
        - G104  # best-effort cleanup is intentional
        - G115  # PG wire codecs do controlled int truncation by design
        - G404  # math/rand is fine for non-crypto sequence/uuid stub seeds in tests
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocyclo
          - gosec
          - noctx
          - revive
          - unconvert
          - unparam
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
