version: "2"
sql:
  - engine: postgresql
    queries: queries.sql
    schema: schema.sql
    gen:
      go:
        package: db
        out: db
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        overrides:
          - db_type: timestamptz
            go_type: time.Time
            nullable: false
          - db_type: timestamptz
            go_type: "*time.Time"
            nullable: true
